name: Daily Telegram Scraper

on:
  schedule:
    # Runs daily at 05:00 UTC (08:00 UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Telegram session
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_SESSION_NAME: scraper_session
        run: |
          mkdir -p data
          echo "$TG_SESSION" | base64 -d > data/${TG_SESSION_NAME}.session

      - name: Run scraper
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_PHONE: ${{ secrets.TG_PHONE }}
          TG_SESSION_NAME: scraper_session
          GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python main.py
