upstream teledrive {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name _;  # Replace _ with your domain: server_name yourdomain.com;

    # Max upload size (for file exports, etc.)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve static files directly (bypass Gunicorn)
    location /static/ {
        alias /opt/teledrive/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
        alias /opt/teledrive/static/favicon.svg;
        expires 30d;
    }

    # WebSocket support for Flask-SocketIO
    location /socket.io/ {
        proxy_pass http://teledrive;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # All other requests to Gunicorn
    location / {
        proxy_pass http://teledrive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ \.(db|session|env|json)$ {
        deny all;
    }
    location /data/ {
        deny all;
    }

    # ─── SSL (uncomment after running certbot) ───
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

